<!-- 
    MÓDULO DE CLIMA DINÁMICO
    Detecta la ubicación del usuario mediante IP y consulta la temperatura actual.
-->
<div id="clima-container" class="p-2 text-start" style="color: #0B1F3B; font-weight: 500; font-size: 0.9rem;">
    <!-- Aquí se inyectará la información de la ciudad y temperatura -->
    <span id="clima-info"><i class="bi bi-cloud-sun"></i> Cargando clima...</span>
</div>

<script>
    /**
     * Función asíncrona que coordina la detección de ubicación y la consulta de clima.
     */
    async function updateWeather() {
        const info = document.getElementById('clima-info');
        try {
            // 1. Obtener datos geográficos (ciudad, latitud, longitud) basados en la IP
            const geoRes = await fetch('https://ipapi.co/json/');
            const geoData = await geoRes.json();
            
            if (geoData.city && geoData.latitude && geoData.longitude) {
                // 2. Consultar el clima actual usando las coordenadas obtenidas
                const weatherRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${geoData.latitude}&longitude=${geoData.longitude}&current_weather=true`);
                const weatherData = await weatherRes.json();
                
                // 3. Mostrar la información final en la interfaz
                const temp = weatherData.current_weather.temperature;
                info.innerHTML = `<i class="bi bi-geo-alt"></i> ${geoData.city}: ${temp}°C`;
            } else {
                info.innerHTML = "Ubicación no disponible";
            }
        } catch (error) {
            console.error("Error al obtener el clima:", error);
            info.innerHTML = "Clima no disponible";
        }
    }
    
    // Iniciar la carga del clima
    updateWeather();
</script>
