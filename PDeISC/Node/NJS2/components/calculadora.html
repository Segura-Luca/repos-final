<!-- 
    CALCULADORA DE INTERÉS COMPUESTO
    Este componente maneja tanto la interfaz como la lógica de cálculo en el cliente.
-->
<div class="card shadow-sm border-0 p-4">
    <h3 class="mb-4" style="color: #0B1F3B;">Calculadora de Interés Compuesto</h3>
    
    <!-- Entradas de datos del usuario -->
    <div class="mb-3">
        <label class="form-label">Capital Inicial ($)</label>
        <input type="number" id="capital" class="form-control" min="0">
    </div>
    <div class="mb-3">
        <label class="form-label">Tasa de Interés Anual (%)</label>
        <input type="number" id="tasa" class="form-control">
    </div>
    <div class="mb-3">
        <label class="form-label">Años</label>
        <input type="number" id="anios" class="form-control" min="0">
    </div>
    
    <!-- Botón de acción -->
    <button onclick="calcular()" class="btn w-100 text-white" style="background-color: #1E4DB7;">Calcular</button>
    
    <!-- Área donde se mostrará el resultado (inicialmente oculta con d-none) -->
    <div id="resultado" class="mt-4 p-3 rounded d-none" style="background-color: #F5F7FA; border-left: 5px solid #1E4DB7;">
        <h5 class="mb-1">Resultado Final:</h5>
        <p id="monto-final" class="h4 fw-bold mb-0" style="color: #0B1F3B;"></p>
    </div>
</div>

<script>
    /**
     * Lógica de cálculo matemático del interés compuesto.
     * Fórmula: A = P(1 + r)^t
     */
    function calcular() {
        const capitalInput = document.getElementById('capital');
        const tasaInput = document.getElementById('tasa');
        const aniosInput = document.getElementById('anios');

        // Conversión de valores de texto a números
        const P = parseFloat(capitalInput.value);
        const r = parseFloat(tasaInput.value) / 100; // La tasa se divide por 100 para obtener el decimal
        const t = parseFloat(aniosInput.value);
        
        // Validación de campos vacíos o no numéricos
        if (isNaN(P) || isNaN(r) || isNaN(t)) {
            alert("Por favor completa todos los campos correctamente.");
            return;
        }

        // Validación de lógica de negocio (Capital y Tiempo no negativos)
        if (P < 0 || t < 0) {
            alert("El capital y los años no pueden ser negativos.");
            return;
        }

        // Aplicación de la fórmula de interés compuesto
        const A = P * Math.pow((1 + r), t);
        
        // Selección de elementos del DOM para mostrar el resultado
        const resDiv = document.getElementById('resultado');
        const montoP = document.getElementById('monto-final');
        
        // Mostrar el área de resultado y formatear el número final con separadores de miles y 2 decimales
        resDiv.classList.remove('d-none');
        montoP.innerText = "$ " + A.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }
</script>
