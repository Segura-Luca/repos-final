<!-- 
    COMPONENTE DE TIEMPO (RELOJ EN VIVO)
    Muestra la hora actual y la actualiza cada segundo.
-->
<div id="tiempo-container" class="p-2 text-end" style="color: #0B1F3B; font-weight: 500;">
    <i class="bi bi-clock"></i> Hora actual: <span id="clock-display"></span>
</div>

<script>
    /**
     * Función que obtiene la hora actual del sistema y la escribe en el DOM.
     */
    function updateClock() {
        const clock = document.getElementById('clock-display');
        if (clock) {
            clock.textContent = new Date().toLocaleTimeString();
        }
    }
    
    // Ejecución inmediata al cargar la página
    updateClock();
    
    // Configuración del intervalo para que se ejecute cada 1000ms (1 segundo)
    setInterval(updateClock, 1000);
</script>
