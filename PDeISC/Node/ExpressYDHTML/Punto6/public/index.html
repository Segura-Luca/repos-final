<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto 6 - Formulario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">Punto 6: Formulario de Registro Dinámico</h2>

        <div class="row">
            <!-- Formulario -->
            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Datos de Usuario</h5>
                    </div>
                    <div class="card-body">
                        <form id="registration-form">
                            <div class="mb-3">
                                <label for="username" class="form-label">Nombre Completo</label>
                                <input type="text" id="username" class="form-control" 
                                    placeholder="Ej: Juan Pérez"
                                    pattern="^[a-zA-ZáéíóúÁÉÍÓÚñÑ]{2,}(?:\s[a-zA-ZáéíóúÁÉÍÓÚñÑ]{2,})+$"
                                    title="Debe ingresar al menos nombre y apellido, solo letras."
                                    required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email" id="email" class="form-control" 
                                    placeholder="usuario@ejemplo.com"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label for="age" class="form-label">Edad</label>
                                <input type="number" id="age" class="form-control" min="18" max="99" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label d-block">Género</label>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="gender-m" value="Masculino" checked>
                                    <label class="form-check-label" for="gender-m">Masculino</label>
                                </div>
                                <div class="form-check form-check-inline">
                                    <input class="form-check-input" type="radio" name="gender" id="gender-f" value="Femenino">
                                    <label class="form-check-label" for="gender-f">Femenino</label>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="country" class="form-label">País</label>
                                <select id="country" class="form-select" required>
                                    <option value="">Selecciona...</option>
                                    <option value="Argentina">Argentina</option>
                                    <option value="Chile">Chile</option>
                                    <option value="Uruguay">Uruguay</option>
                                </select>
                            </div>

                            <div class="mb-3 form-check">
                                <input type="checkbox" class="form-check-input" id="terms">
                                <label class="form-check-label" for="terms">Acepto los términos y condiciones</label>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">Registrar</button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- Resultado -->
            <div class="col-md-6 mt-4 mt-md-0">
                <div class="card shadow-sm border-success">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Resultado del Registro</h5>
                    </div>
                    <div id="result-container" class="card-body">
                        <p class="text-muted italic">Completa el formulario para ver los datos aquí.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
