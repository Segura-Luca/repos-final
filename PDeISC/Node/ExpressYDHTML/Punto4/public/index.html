<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto 4 - Nodos Dinámicos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">Punto 4: Nodos y Atributos</h2>

        <div class="row">
            <div class="col-md-6">
                <div class="card shadow-sm mb-4">
                    <div class="card-body">
                        <h5>Generación de Nodos</h5>
                        <button id="btn-generate-nodes" class="btn btn-primary mb-3">Generar 5 Nodos</button>
                        <ul id="nodes-container" class="list-group">
                            <!-- Nodos generados aquí -->
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>Modificación de Atributos</h5>
                        <div class="mb-3">
                            <a id="dynamic-link" href="https://www.google.com" target="_blank" class="btn btn-outline-danger">Ir a Google</a>
                        </div>
                        <button id="btn-change-attr" class="btn btn-warning">Cambiar URL</button>
                        
                        <div class="mt-4 p-3 bg-dark text-white rounded">
                            <p>Atributo antes: <span id="attr-before" class="text-info">N/A</span></p>
                            <p>Atributo después: <span id="attr-after" class="text-success">N/A</span></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
