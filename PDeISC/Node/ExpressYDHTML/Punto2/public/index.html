<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto 2 - Navegación y Eventos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Event Lab</a>
            <div class="navbar-nav">
                <button class="nav-link btn btn-link" data-target="component-click">Click</button>
                <button class="nav-link btn btn-link" data-target="component-mouseover">Mouseover</button>
                <button class="nav-link btn btn-link" data-target="component-keypress">Keypress</button>
                <button class="nav-link btn btn-link" data-target="component-change">Change</button>
                <button class="nav-link btn btn-link" data-target="component-dblclick">Dblclick</button>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Punto 2: Componentes y Eventos</h2>

        <!-- Componentes Dinámicos -->
        <div id="content-area">
            <div id="component-click" class="component-section p-4 bg-white rounded shadow-sm">
                <h3>Evento Click</h3>
                <button id="target-click" class="btn btn-primary">Hazme Click</button>
                <p id="result-click" class="mt-3"></p>
            </div>

            <div id="component-mouseover" class="component-section p-4 bg-white rounded shadow-sm d-none">
                <h3>Evento Mouseover</h3>
                <div id="target-mouseover" class="p-5 bg-warning text-center rounded">
                    Pasa el mouse por aquí
                </div>
                <p id="result-mouseover" class="mt-3"></p>
            </div>

            <div id="component-keypress" class="component-section p-4 bg-white rounded shadow-sm d-none">
                <h3>Evento Keypress</h3>
                <input type="text" id="target-keypress" class="form-control" placeholder="Escribe algo aquí...">
                <p id="result-keypress" class="mt-3"></p>
            </div>

            <div id="component-change" class="component-section p-4 bg-white rounded shadow-sm d-none">
                <h3>Evento Change</h3>
                <select id="target-change" class="form-select">
                    <option value="">Selecciona una opción</option>
                    <option value="Opción 1">Opción 1</option>
                    <option value="Opción 2">Opción 2</option>
                    <option value="Opción 3">Opción 3</option>
                </select>
                <p id="result-change" class="mt-3"></p>
            </div>

            <div id="component-dblclick" class="component-section p-4 bg-white rounded shadow-sm d-none">
                <h3>Evento Double Click</h3>
                <div id="target-dblclick" class="p-5 bg-danger text-white text-center rounded cursor-pointer">
                    Haz doble click aquí
                </div>
                <p id="result-dblclick" class="mt-3"></p>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
