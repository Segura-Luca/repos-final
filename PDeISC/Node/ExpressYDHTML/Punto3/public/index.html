<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto 3 - Contador de Hijos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">Punto 3: Explorador de Hijos del DOM</h2>
        
        <div class="card shadow-sm border-0">
            <div class="card-body text-center p-5">
                <h5 class="mb-4">Elemento Objetivo</h5>
                <div id="parent-element" class="p-4 mb-4 rounded bg-light border d-flex justify-content-center gap-3">
                    <div class="p-3 bg-primary text-white rounded shadow-sm">Hijo 1</div>
                    <div class="p-3 bg-success text-white rounded shadow-sm">Hijo 2</div>
                    <div class="p-3 bg-info text-white rounded shadow-sm">Hijo 3</div>
                    <div class="p-3 bg-warning text-white rounded shadow-sm">Hijo 4</div>
                </div>
                <button id="btn-count-children" class="btn btn-primary btn-lg">Contar Hijos Directos</button>
                <div id="result-area" class="mt-4"></div>
            </div>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
