<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto 1 - Manipulación del DOM</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- SweetAlert2 para pop-ups elegantes -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">
    <div class="container py-5">
        <h2 class="text-center mb-4">Punto 1: Manipulación Dinámica del DOM</h2>
        
        <div id="container-h1" class="text-center mb-4 border p-3 bg-white rounded shadow-sm" style="min-height: 100px;">
            <!-- El H1 se agregará aquí -->
        </div>

        <div id="container-img" class="text-center mb-4 border p-3 bg-white rounded shadow-sm" style="min-height: 200px;">
            <!-- La imagen se agregará aquí -->
        </div>

        <div class="row g-3 justify-content-center">
            <div class="col-auto">
                <button id="btn-add-h1" class="btn btn-primary">Agregar H1</button>
            </div>
            <div class="col-auto">
                <button id="btn-change-text" class="btn btn-secondary">Cambiar Texto H1</button>
            </div>
            <div class="col-auto">
                <button id="btn-change-color" class="btn btn-warning">Cambiar Color H1</button>
            </div>
            <div class="col-auto">
                <button id="btn-add-img" class="btn btn-success">Agregar Imagen</button>
            </div>
            <div class="col-auto">
                <button id="btn-change-img" class="btn btn-info">Cambiar Imagen</button>
            </div>
            <div class="col-auto">
                <button id="btn-resize-img" class="btn btn-dark">Cambiar Tamaño Imagen</button>
            </div>
        </div>
    </div>

    <!-- Script principal como módulo -->
    <script type="module" src="script.js"></script>
</body>
</html>
